<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Whisper</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css" />
<style>
  /* Mini-app specific overrides - full height, no topbar (Telegram provides its own chrome) */
  body { padding: 0; }
  main { max-width: 100%; padding: 12px 12px 90px; gap: 14px; }
  .panel { padding: 16px; border-radius: 12px; }
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: var(--panel); border-top: 1px solid var(--panel-border);
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 10;
  }
  .tab-btn {
    flex: 1; text-align: center; padding: 12px 4px; font-size: 0.72rem;
    color: var(--text-dim); background: none; border: none; cursor: pointer;
  }
  .tab-btn.active { color: var(--purple-bright); }
  .tab-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
  .view { display: none; }
  .view.active { display: block; }
  .mini-header { text-align: center; padding: 10px 0 4px; }
  .mini-header img { width: 40px; height: 40px; border-radius: 8px; filter: drop-shadow(0 0 8px var(--purple-glow)); }
</style>
</head>
<body>

<div class="mini-header">
  <img src="assets/logo.jpg" alt="Whisper" />
</div>

<main>

  <!-- LOGIN VIEW -->
  <section id="loginView" class="panel hidden">
    <h2 style="text-align:center;">Sign in to link this chat</h2>
    <p class="sub" style="text-align:center;">One time only — after this, opening the app will log you in automatically.</p>
    <div class="auth-tabs" style="justify-content:center;">
      <button class="tab active" data-tab="login">Sign in</button>
      <button class="tab" data-tab="register">Create account</button>
    </div>
    <form id="loginForm" class="auth-form">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit" class="btn-primary">Sign in &amp; link</button>
    </form>
    <form id="registerForm" class="auth-form hidden">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password (6+ characters)" required minlength="6" />
      <button type="submit" class="btn-primary">Create account &amp; link</button>
    </form>
    <p id="authError" class="error hidden"></p>
  </section>

  <!-- ALERTS VIEW -->
  <section id="alertsView" class="view">
    <div class="panel">
      <div class="panel-head"><h2>Upcoming alerts</h2></div>
      <div id="rulesList"></div>
      <p id="rulesEmpty" class="sub hidden">No alerts yet — tap Create below.</p>
    </div>
  </section>

  <!-- CREATE VIEW -->
  <section id="createView" class="view">
    <div class="panel">
      <div class="panel-head"><h2>Create new alert</h2></div>
      <form id="ruleForm" class="rule-form" style="grid-template-columns:1fr;">
        <select name="symbol" id="symbolSelect" required></select>
        <select name="timeframe" id="timeframeSelect" required></select>
        <input type="number" step="any" name="target_price" placeholder="Target price" required />
        <select name="direction">
          <option value="buy">Buy (price crosses up)</option>
          <option value="sell">Sell (price crosses down)</option>
        </select>
        <select name="sound">
          <option value="default">Default sound</option>
          <option value="urgent">Urgent sound</option>
          <option value="chime">Chime</option>
        </select>
        <textarea name="description" placeholder="Description (optional)" rows="2"></textarea>
        <button type="submit" class="btn-primary">Create alert</button>
      </form>
      <p id="createStatus" class="sub" style="margin-top:10px;"></p>
    </div>
  </section>

  <!-- HISTORY VIEW -->
  <section id="historyView" class="view">
    <div class="panel">
      <div class="panel-head"><h2>History</h2></div>
      <div id="historyList"></div>
    </div>
  </section>

  <!-- SHARED VIEW -->
  <section id="sharedView" class="view">
    <div class="panel">
      <h2>Receive someone's alerts</h2>
      <p class="sub">They must approve from their own dashboard/app first.</p>
      <form id="requestForm" style="display:flex;gap:8px;">
        <input type="email" id="ownerEmailInput" placeholder="Their email" required style="flex:1;" />
        <button type="submit" class="btn-primary">Ask</button>
      </form>
      <p id="requestStatus" class="sub" style="margin-top:8px;"></p>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Who follows me</h2></div>
      <div id="incomingList"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>I'm receiving from</h2></div>
      <div id="outgoingList"></div>
    </div>
  </section>

</main>

<nav class="tabbar hidden" id="tabbar">
  <button class="tab-btn active" data-view="alertsView"><span class="tab-icon">🔔</span>Alerts</button>
  <button class="tab-btn" data-view="createView"><span class="tab-icon">➕</span>Create</button>
  <button class="tab-btn" data-view="historyView"><span class="tab-icon">🕘</span>History</button>
  <button class="tab-btn" data-view="sharedView"><span class="tab-icon">👥</span>Shared</button>
</nav>

<script src="common.js"></script>
<script src="telegram-app.js"></script>
</body>
</html>
