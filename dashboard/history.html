<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Whisper — Alert History</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="assets/logo.jpg" alt="Whisper" class="brand-mark" />
    <span class="brand-name">WHISPER</span>
  </div>
  <nav class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="history.html" class="nav-link active">History</a>
    <a href="shared.html" class="nav-link">Shared Alerts</a>
    <a href="connect.html" class="nav-link">Connect</a>
  </nav>
  <div class="account-box">
    <button id="logoutBtn" class="btn-ghost">Sign out</button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-head">
      <h2>Recent alert history</h2>
      <button id="refreshBtn" class="btn-ghost">Refresh</button>
    </div>
    <div class="table-scroll">
      <table class="rule-table">
        <thead><tr><th>Symbol</th><th>Price</th><th>Direction</th><th>Sent via</th><th>When</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="common.js"></script>
<script>
  if (requireAuthOrRedirect()) {
    document.getElementById('logoutBtn').addEventListener('click', whisperLogout);

    async function loadHistory() {
      const history = await api('/rules/history/log');
      document.getElementById('historyBody').innerHTML = history
        .map((h) => `
          <tr>
            <td>${labelForSymbol(h.symbol)}${h.is_shared ? `<br><span style="color:var(--purple-bright);font-size:0.75rem;">shared by ${h.owner_email}</span>` : ''}</td>
            <td>${h.price}</td>
            <td>${h.direction}</td>
            <td>${[h.dispatched_telegram ? 'Telegram' : null, h.dispatched_fcm ? 'App' : null].filter(Boolean).join(' + ') || '—'}</td>
            <td>${new Date(h.created_at).toLocaleString()}</td>
          </tr>`)
        .join('');
    }

    document.getElementById('refreshBtn').addEventListener('click', loadHistory);
    loadHistory();
  }
</script>
</body>
</html>
